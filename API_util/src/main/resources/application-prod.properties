# =============================================
# Producao - Railway
# Variaveis de ambiente configuradas no Railway
# =============================================

# PostgreSQL (Railway injeta PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD)
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# CORS - GitHub Pages
app.cors.allowed-origins=https://emanuxl19.github.io

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# AI Provider (opcional)
ai.provider=${AI_PROVIDER:none}
ai.api.key=${AI_API_KEY:}
ai.model=${AI_MODEL:}
ai.base-url=${AI_BASE_URL:}
ai.ollama-url=${AI_OLLAMA_URL:http://localhost:11434}

# Telegram (opcional)
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.chat.id=${TELEGRAM_CHAT_ID:}

app.lembrete.intervalo-ms=60000
