# =============================================
# Producao - Railway
# Variaveis de ambiente configuradas no Railway
# =============================================

# PostgreSQL (Railway injeta PGHOST/PGPORT e, em alguns casos, PGHOST_PRIVATE/PGPORT_PRIVATE)
spring.datasource.url=jdbc:postgresql://${PGHOST_PRIVATE:${PGHOST:localhost}}:${PGPORT_PRIVATE:${PGPORT:5432}}/${PGDATABASE:postgres}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# CORS - GitHub Pages
app.cors.allowed-origins=https://emanuxl19.github.io

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# AI Provider (opcional)
ai.provider=${AI_PROVIDER:none}
ai.api.key=${AI_API_KEY:}
ai.model=${AI_MODEL:}
ai.base-url=${AI_BASE_URL:}
ai.ollama-url=${AI_OLLAMA_URL:http://localhost:11434}

# Telegram (opcional)
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.chat.id=${TELEGRAM_CHAT_ID:}

app.lembrete.intervalo-ms=60000

# Actuator probes para healthcheck do Railway
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
