<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <div class="auth-header">
        <mat-icon class="auth-icon">task_alt</mat-icon>
        <h1>Gestor Lab</h1>
        <p>Crie sua conta</p>
      </div>
    </mat-card-header>

    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nome</mat-label>
        <input matInput [(ngModel)]="nome">
        <mat-icon matSuffix>person</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" [(ngModel)]="email">
        <mat-icon matSuffix>email</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Senha</mat-label>
        <input matInput [type]="mostrarSenha ? 'text' : 'password'" [(ngModel)]="senha" (keyup.enter)="register()">
        <button matSuffix mat-icon-button (click)="mostrarSenha = !mostrarSenha" type="button">
          <mat-icon>{{ mostrarSenha ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-hint>Minimo 6 caracteres</mat-hint>
      </mat-form-field>

      <button mat-raised-button color="primary" class="full-width register-btn"
              (click)="register()" [disabled]="loading">
        <mat-spinner diameter="18" *ngIf="loading"></mat-spinner>
        <span *ngIf="!loading">Cadastrar</span>
      </button>

      <p class="auth-link">
        Ja tem conta? <a routerLink="/login">Entrar</a>
      </p>
    </mat-card-content>
  </mat-card>
</div>
