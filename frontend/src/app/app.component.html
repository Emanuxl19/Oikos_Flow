<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">
        <mat-icon>rocket_launch</mat-icon>
      </div>
      <div>
        <div class="brand-title">Oikos Flow</div>
        <div class="brand-subtitle">Workspace Intelligence</div>
      </div>
    </div>

    <nav class="menu">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.route"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        class="menu-link">
        <mat-icon>{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <button mat-raised-button color="primary" routerLink="/atividades/nova" class="sidebar-cta">
      <mat-icon>add</mat-icon>
      Encontrar espaco
    </button>
  </aside>

  <main class="workspace">
    <header class="topbar">
      <div class="searchbox">
        <mat-icon>search</mat-icon>
        <input
          type="text"
          placeholder="Buscar espacos, atividades ou localizacoes..."
          [value]="quickSearch"
          (input)="quickSearch = $any($event.target).value">
      </div>

      <div class="top-actions">
        <button mat-icon-button matTooltip="Lembretes ativos" *ngIf="lembreteCount > 0">
          <mat-icon [matBadge]="lembreteCount" matBadgeColor="warn" matBadgeSize="small">notifications</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Sem lembretes" *ngIf="lembreteCount === 0">
          <mat-icon>notifications_none</mat-icon>
        </button>

        <div class="user-pill" *ngIf="auth.getUser()">
          <mat-icon>person</mat-icon>
          <span>{{ auth.getUser()?.nome }}</span>
        </div>

        <button mat-icon-button matTooltip="Sair" (click)="auth.logout()" *ngIf="auth.isLoggedIn()">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </header>

    <section class="quick-nav">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.route"
        routerLinkActive="quick-active"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        class="quick-chip">
        <mat-icon>{{ item.icon }}</mat-icon>
        {{ item.label }}
      </a>
    </section>

    <section class="page-content">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>

<div class="lembrete-overlay">
  <app-notification-toast
    *ngFor="let nota of lembretes"
    [nota]="nota"
    (dismiss)="dismissLembrete($event)">
  </app-notification-toast>
</div>
