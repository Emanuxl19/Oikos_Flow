name: Deploy Frontend → GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/package.json'
      - 'frontend/angular.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular (producao)
        working-directory: frontend
        run: npx ng build --configuration production --base-href /Oikos_Flow/

      - name: Copiar 404.html para SPA routing
        run: cp frontend/dist/gestor-atividades/browser/index.html frontend/dist/gestor-atividades/browser/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist/gestor-atividades/browser
          force_orphan: true
